<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ringtone Zone — WAP 2.0</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="ticker-bar">
    <div class="ticker-inner">
      <span>WAP 2.0</span><span class="sep"> | </span>
      <span>RINGTONE ZONE</span><span class="sep"> | </span>
      <span>★ NEW ARRIVALS ★</span><span class="sep"> | </span>
      <span>WAP 2.0</span><span class="sep"> | </span>
      <span>RINGTONE ZONE</span><span class="sep"> | </span>
      <span>★ NEW ARRIVALS ★</span>
    </div>
  </div>

  <div class="phone-wrap">
    <div class="phone">

      <!-- ① TOP CAP — coloured rounded dome -->
      <div class="top-cap">
        <div class="earpiece"></div>
        <div class="camera-dot"></div>
        <div class="nokia-logo">NOKIA</div>
      </div>

      <!-- ② SCREEN ZONE — sits inside dark middle band -->
      <div class="middle-band">
        <div class="screen-frame">
          <div class="screen">
            <div class="status-bar">
              <div class="signal">
                <span class="bar b1"></span><span class="bar b2"></span>
                <span class="bar b3"></span><span class="bar b4"></span>
              </div>
              <div class="screen-label">RINGTONE ZONE</div>
              <div class="battery"><div class="battery-fill"></div></div>
            </div>
            <div class="screen-body">
              <div class="music-icon">♪</div>
              <div class="song-info">
                <div class="song-title" id="songTitle">BITU BITUIN</div>
                <div class="song-artist" id="songArtist">DANTE PAOLO</div>
              </div>
              <div class="input-box">
                <span id="inputDisplay"></span><span class="cursor">_</span>
              </div>
              <button class="btn-preview" id="previewBtn">▶ PREVIEW</button>
              <button class="btn-set" id="setBtn">SET AS RINGTONE</button>
            </div>
          </div>
        </div>

        <!-- Soft-key labels (printed on band, above nav bar) -->
        <div class="softlabel-row">
          <span class="softlabel">Menu</span>
          <span class="softlabel" style="visibility:hidden">·</span>
          <span class="softlabel">Back</span>
        </div>

        <!-- ③ NAV BAR — large flat oval with d-pad -->
        <div class="navbar">
          <div class="dpad-ring">
            <button class="dp-btn dp-up"    data-dir="up">▲</button>
            <div class="dp-mid">
              <button class="dp-btn dp-left"  data-dir="left">◀</button>
              <button class="dp-ok" id="okBtn">OK</button>
              <button class="dp-btn dp-right" data-dir="right">▶</button>
            </div>
            <button class="dp-btn dp-down"  data-dir="down">▼</button>
          </div>
        </div>

        <!-- Call / End row -->
        <div class="call-row">
          <button class="call-btn green" id="callBtn" title="Call">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C9.6 21 3 14.4 3 6c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
            </svg>
          </button>
          <button class="soft-btn" id="menuBtn">≡</button>
          <button class="soft-btn back-soft" id="clrBtn">←</button>
          <button class="call-btn red" id="endBtn" title="End">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M20.9 3.1C16.8-.4 9.2-.4 5.1 3.1L3 5.2l2.8 2.8 1.4-1.4c2.9-2.3 7.7-2.3 10.6 0l1.4 1.4L22 5.2l-1.1-2.1zM12 10c-1.5 0-2.9.5-4 1.4L5.6 9l-2.8 2.8 2.1 2.1C3.7 15.3 3 17.1 3 19h2c0-1.3.5-2.6 1.3-3.5L8.5 18l1.4-1.4 1.1 1.1V21h2v-3.3l1.1-1.1L15.5 18l2.2-2.5c.8.9 1.3 2.2 1.3 3.5h2c0-1.9-.7-3.7-1.9-5.1l2.1-2.1L18.4 9 16 11.4C14.9 10.5 13.5 10 12 10z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- ④ BOTTOM CAP — coloured, holds numpad -->
      <div class="bottom-cap">
        <div class="numpad">
          <button class="num-btn" data-num="1"><span class="num">1</span><span class="sub">&nbsp;</span></button>
          <button class="num-btn" data-num="2"><span class="num">2</span><span class="sub">abc</span></button>
          <button class="num-btn" data-num="3"><span class="num">3</span><span class="sub">def</span></button>
          <button class="num-btn" data-num="4"><span class="num">4</span><span class="sub">ghi</span></button>
          <button class="num-btn" data-num="5"><span class="num">5</span><span class="sub">jkl</span></button>
          <button class="num-btn" data-num="6"><span class="num">6</span><span class="sub">mno6</span></button>
          <button class="num-btn" data-num="7"><span class="num">7</span><span class="sub">pqrs</span></button>
          <button class="num-btn" data-num="8"><span class="num">8</span><span class="sub">tuv</span></button>
          <button class="num-btn" data-num="9"><span class="num">9</span><span class="sub">wxyz</span></button>
          <button class="num-btn sym" data-num="*"><span class="num">*</span></button>
          <button class="num-btn" data-num="0"><span class="num">0</span><span class="sub">+</span></button>
          <button class="num-btn sym" data-num="#"><span class="num">#</span></button>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
