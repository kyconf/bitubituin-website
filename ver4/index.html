<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Phone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">
    <div class="top-jack"></div>
    <div class="side-button volume-rocker"></div>
    <div class="side-button power-button"></div>



    <div class="silver-bezel">
        <div class="screen-border">
        
        
    <div class="earpiece-container">      
        <div class="earpiece"></div>
        <div class="helo"> ᜊᜒᜆᜓᜊᜒᜆᜓᜁᜈ᜔ </div>
    </div>
            <div class="screen">
                
                <div class="glass-glare"></div> <div class="status-bar">
                    <span class="signal">illl</span>
                    <span class="app-title">RINGTONE ZONE</span>
                    <span class="battery">🔋</span>
                </div>
                
                <div class="music-ui">
                    <div class="header">- NEW RELEASE -</div>
                    <div class="icon">🎵</div>
                    <h2 class="song-title">BITUBITUIN</h2>
                    <h3 class="artist">DANTE PAOLO</h3>
                    
                    <div class="progress-container"></div>
                    
                    <button id="preview-btn" class="preview-btn">▶ PREVIEW</button>
                    <div class="footer-action">↓ SET AS RINGTONE</div>
                </div>
            </div>
        </div>

        <div class="action-controls">
            <button class="action-btn left-action">
                <span class="icon1">◄</span> BACK
            </button>
            
            <div class="d-pad-container">
                <div class="d-pad-ring"></div>
                <button class="d-pad-center"></button>
            </div>
            
            <button class="action-btn right-action">
                CALL <span class="icon1">►</span>
            </button>
        </div>
    </div>

    <div class="numpad">
        <button class="num-key">1 <span>⌴</span></button>
        <button class="num-key">2 <span>abc</span></button>
        <button class="num-key">3 <span>def</span></button>
        <button class="num-key">4 <span>ghi</span></button>
        <button class="num-key">5 <span>jkl</span></button>
        <button class="num-key">6 <span>mno</span></button>
        <button class="num-key">7 <span>pqrs</span></button>
        <button class="num-key">8 <span>tuv</span></button>
        <button class="num-key">9 <span>wxyz</span></button>
        <button class="num-key">* <span>+</span></button>
        <button class="num-key">0 <span>⇧</span></button>
        <button class="num-key"># <span>↵</span></button>
    </div>
</div>

<script src="script.js"></script> </body>
</html>
